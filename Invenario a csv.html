<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inventario</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:sans-serif;background:#f4f6f8;display:flex;flex-direction:column;min-height:100vh}
header{background:#2c3e50;color:white;padding:15px;text-align:center;position:sticky;top:0;z-index:100}
.container{flex:1;display:flex;flex-direction:column;padding:10px;gap:10px;max-height:calc(100vh - 140px);overflow:hidden}
.manual{display:flex;flex-direction:column;gap:12px}
.manual input{width:100%;padding:15px;font-size:18px;border-radius:10px;border:2px solid #ddd;background:white}
.manual button{width:100%;padding:15px;font-size:18px;border-radius:10px;background:#2ecc71;color:white;border:none;font-weight:500}
.tabla-container{position:relative;overflow:hidden;border-radius:10px;max-height:60vh;background:white;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.table-wrapper{overflow:auto;height:100%;max-height:60vh}
table{width:100%;border-collapse:collapse;min-width:300px}
thead{position:sticky;top:0;z-index:10;background:#34495e}
th{padding:15px 8px;text-align:center;color:white;font-weight:600;border-bottom:2px solid #2c3e50;font-size:16px}
td{padding:12px 8px;text-align:center;border-bottom:1px solid #eee;font-size:16px;vertical-align:middle}
tbody tr{cursor:pointer;transition:background 0.2s}
tbody tr:hover{background:#f8f9fa}
.footer{position:sticky;bottom:0;background:#fff;padding:15px 10px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.1);margin-top:auto}
.footer button{width:100%;padding:18px;font-size:18px;background:#3498db;color:white;border:none;border-radius:10px;font-weight:bold;box-shadow:0 4px 15px rgba(52,152,219,0.3)}
.badge{background:#3498db;color:white;padding:6px 12px;border-radius:12px;margin-left:10px;font-weight:bold}
.popup-btn{width:100%;padding:14px;margin:6px 0;font-size:16px;border:none;border-radius:10px;font-weight:500}
.nuevo-codigo-popup p{font-size:18px;margin-bottom:15px}
.cero-confirm{background:#ffebee !important;border:2px solid #f44336 !important}
</style>
</head>

<body>
<header>
📦 Inventario <span id="totalCodigos" class="badge">0</span>
</header>

<div class="container">
  <div class="manual">
    <input id="manualInput" placeholder="🔍 Código (Enter o botón)" onkeydown="if(event.key==='Enter') añadirManual(event)">
    <button onclick="añadirManual(event)">➕ Procesar código</button>
  </div>

  <div class="tabla-container">
    <div class="table-wrapper">
      <table id="tabla">
        <thead>
          <tr>
            <th>📱 Código</th>
            <th>🔢 Cantidad</th>
            <th>🗑️</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">
  <button onclick="exportarCSV()">📁 Exportar CSV</button>
  <center><h5>Victor Patricio ©</h5></center>
</div>

<!-- 🔥 POPUP NORMAL -->
<div id="popupNormal" style="display:none !important;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:white;padding:25px;border-radius:15px;width:90%;max-width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.4)">
    <p id="popupTexto" style="font-size:16px;margin-bottom:20px;line-height:1.4"></p>
    <div id="modoOpciones">
      <button class="popup-btn" onclick="accion('sumar')" style="background:#2ecc71;color:white">➕ +1 unidad</button>
      <button class="popup-btn" onclick="mostrarInput()" style="background:#3498db;color:white">✏️ Cambiar cantidad</button>
      <button class="popup-btn" onclick="accion('eliminar')" style="background:#e74c3c;color:white">🗑️ Eliminar</button>
    </div>
    <div id="modoInput" style="display:none">
      <input id="inputCantidad" 
             type="tel" 
             inputmode="numeric" 
             pattern="[0-9]*" 
             placeholder="0"
             style="width:100%;padding:20px;font-size:24px;border:2px solid #3498db;border-radius:12px;text-align:center;font-weight:bold;margin:15px 0;font-family:monospace"
             autocomplete="off">
      <div style="display:flex;gap:12px">
        <button class="popup-btn" onclick="cerrarPopupNormal()" style="background:#95a5a6;color:white;flex:1;padding:15px">Cancelar</button>
        <button class="popup-btn" id="btnConfirmarCantidad" onclick="confirmarCantidad()" style="background:#27ae60;color:white;flex:1;padding:15px">✅ OK</button>
      </div>
    </div>
  </div>
</div>

<!-- 🔥 POPUP NUEVO CÓDIGO -->
<div id="popupNuevo" style="display:none !important;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:white;padding:25px;border-radius:15px;width:90%;max-width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.4)">
    <p class="nuevo-codigo-popup">✅ Nuevo código encontrado:<br><strong id="nuevoCodigoTexto"></strong><br><br>¿Cuántas unidades hay?</p>
    <input id="inputNuevoCantidad" 
           type="tel" 
           inputmode="numeric" 
           pattern="[0-9]*" 
           placeholder="1"
           style="width:100%;padding:20px;font-size:24px;border:2px solid #2ecc71;border-radius:12px;text-align:center;font-weight:bold;margin:15px 0;font-family:monospace"
           autocomplete="off">
    <div style="display:flex;gap:12px">
      <button class="popup-btn" onclick="cerrarPopupNuevo()" style="background:#95a5a6;color:white;flex:1;padding:15px">Cancelar</button>
      <button class="popup-btn" onclick="confirmarNuevoCodigo()" style="background:#27ae60;color:white;flex:1;padding:15px">✅ Añadir</button>
    </div>
  </div>
</div>

<script>
let inventario = [];
let buffer = "", timeout = null;
let indexActual = null;
let codigoNuevoPendiente = null;

try {
  const data = localStorage.getItem('inv');
  if(data) {
    const parsed = JSON.parse(data);
    if(Array.isArray(parsed) && parsed.every(item => item && item.codigo && typeof item.cantidad === 'number')) {
      inventario = parsed;
    }
  }
} catch(e) {
  localStorage.removeItem('inv');
}

const totalCodigosEl = document.getElementById('totalCodigos');
const popupNormal = document.getElementById('popupNormal');
const popupNuevo = document.getElementById('popupNuevo');
const popupTexto = document.getElementById('popupTexto');
const modoOpciones = document.getElementById('modoOpciones');
const modoInput = document.getElementById('modoInput');
const inputCantidad = document.getElementById('inputCantidad');
const inputNuevoCantidad = document.getElementById('inputNuevoCantidad');
const manualInput = document.getElementById('manualInput');
const nuevoCodigoTexto = document.getElementById('nuevoCodigoTexto');
const btnConfirmarCantidad = document.getElementById('btnConfirmarCantidad');

function beep(){try{new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()}catch{}}
function vibrar(){if(navigator.vibrate)navigator.vibrate([50,50,50])}
function guardarLocal(){localStorage.setItem('inv', JSON.stringify(inventario))}

function actualizarTabla(){
  let tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";
  
  inventario.forEach((item,i) => {
    if(!item || !item.codigo) return;
    tbody.innerHTML += `
    <tr onclick="abrirPopup(${i})">
      <td style="font-family:monospace;font-weight:500;max-width:150px;word-break:break-all">${item.codigo}</td>
      <td style="color:#27ae60;font-weight:bold;font-size:18px">${item.cantidad}</td>
      <td><button onclick="event.stopPropagation(); borrar(${i})" style="background:#e74c3c;color:white;border:none;border-radius:50%;width:40px;height:40px;font-size:14px">🗑️</button></td>
    </tr>`;
  });

  totalCodigosEl.textContent = inventario.length;
  guardarLocal();
}

function abrirPopup(i){
  if(i < 0 || i >= inventario.length || !inventario[i] || !inventario[i].codigo) return false;
  
  indexActual = i;
  popupTexto.innerText = `Código: ${inventario[i].codigo}\nCantidad actual: ${inventario[i].cantidad}`;
  modoOpciones.style.display = 'block';
  modoInput.style.display = 'none';
  inputCantidad.classList.remove('cero-confirm');
  btnConfirmarCantidad.style.background = '#27ae60';
  popupNormal.style.display = 'flex';
  vibrar();
  return true;
}

function mostrarInput(){
  if(!abrirPopup(indexActual)) return;
  modoOpciones.style.display = 'none';
  modoInput.style.display = 'block';
  inputCantidad.value = Math.max(0, inventario[indexActual].cantidad || 0);
  
  // ✅ Listener para detectar cuando pone 0
  const checkCero = () => {
    if(inputCantidad.value === '0') {
      inputCantidad.classList.add('cero-confirm');
      inputCantidad.style.borderColor = '#f44336';
      btnConfirmarCantidad.innerHTML = '🗑️ BORRAR';
      btnConfirmarCantidad.style.background = '#e74c3c';
      popupTexto.innerHTML = `<strong>${inventario[indexActual].codigo}</strong><br><span style="color:#f44336">⚠️ Cantidad 0 = ELIMINAR artículo</span>`;
    } else {
      inputCantidad.classList.remove('cero-confirm');
      inputCantidad.style.borderColor = '#3498db';
      btnConfirmarCantidad.innerHTML = '✅ OK';
      btnConfirmarCantidad.style.background = '#27ae60';
      popupTexto.innerText = `Código: ${inventario[indexActual].codigo}\nCantidad actual: ${inventario[indexActual].cantidad}`;
    }
  };
  
  inputCantidad.oninput = checkCero;
  
  setTimeout(() => {
    inputCantidad.focus();
    inputCantidad.select();
    const handleInput = (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
      checkCero();
    };
    const handleKeyDown = (e) => {
      if(e.key === '-' || e.key === 'NumpadSubtract') e.preventDefault();
    };
    
    inputCantidad.addEventListener('input', handleInput);
    inputCantidad.addEventListener('keydown', handleKeyDown);
    
    setTimeout(() => {
      inputCantidad.removeEventListener('input', handleInput);
      inputCantidad.removeEventListener('keydown', handleKeyDown);
      inputCantidad.oninput = null;
    }, 3000);
  }, 200);
}

function confirmarCantidad(){
  if(!abrirPopup(indexActual)) return;
  
  let v = parseInt(inputCantidad.value) || 0;
  
  // ✅ CONFIRMACIÓN ESPECIAL PARA CERO
  if(v === 0) {
    if(confirm(`🗑️ ¿Eliminar definitivamente el código ${inventario[indexActual].codigo}?`)) {
      inventario.splice(indexActual, 1);
    }
  } else if(v > 0) {
    inventario[indexActual].cantidad = v;
  } else {
    alert('❌ Solo números positivos');
    return;
  }
  
  indexActual = null;
  cerrarPopupNormal();
  actualizarTabla();
  vibrar();
}

function accion(tipo){
  if(!abrirPopup(indexActual)) return;
  if(tipo === 'sumar') {
    inventario[indexActual].cantidad = Math.max(1, (inventario[indexActual].cantidad || 0) + 1);
  } else if(tipo === 'eliminar') {
    if(confirm(`🗑️ ¿Eliminar definitivamente ${inventario[indexActual].codigo}?`)) {
      inventario.splice(indexActual, 1);
    }
  }
  indexActual = null;
  cerrarPopupNormal();
  actualizarTabla();
  vibrar();
}

function cerrarPopupNormal(){
  popupNormal.style.display = 'none';
  inputCantidad.blur();
  inputCantidad.classList.remove('cero-confirm');
  indexActual = null;
}

// NUEVO CÓDIGO
function mostrarPopupNuevo(codigo){
  codigoNuevoPendiente = codigo;
  nuevoCodigoTexto.textContent = codigo;
  inputNuevoCantidad.value = '1';
  popupNuevo.style.display = 'flex';
  vibrar();
  
  setTimeout(() => {
    inputNuevoCantidad.focus();
    inputNuevoCantidad.select();
  }, 300);
}

function cerrarPopupNuevo(){
  popupNuevo.style.display = 'none';
  codigoNuevoPendiente = null;
  inputNuevoCantidad.blur();
}

function confirmarNuevoCodigo(){
  let cantidad = parseInt(inputNuevoCantidad.value) || 1;
  if(cantidad <= 0) {
    alert('❌ Cantidad debe ser mayor que 0');
    return;
  }
  
  if(codigoNuevoPendiente) {
    inventario.push({
      codigo: codigoNuevoPendiente, 
      cantidad: cantidad
    });
    beep();
    vibrar();
    actualizarTabla();
  }
  
  cerrarPopupNuevo();
}

function procesar(codigo){
  if(!codigo || codigo.length < 3) return;
  if(codigo.toLowerCase() === 'unidentified') {
    alert('❌ Código inválido');
    return;
  }
  let i = inventario.findIndex(x => x && x.codigo === codigo);
  if(i > -1) {
    abrirPopup(i);
  } else {
    mostrarPopupNuevo(codigo);
  }
}

document.addEventListener("keydown", e => {
  if (document.activeElement.id === 'manualInput' || 
      document.activeElement.id === 'inputCantidad' || 
      document.activeElement.id === 'inputNuevoCantidad' || 
      popupNormal.style.display !== 'none' ||
      popupNuevo.style.display !== 'none') return;
  
  if(timeout) clearTimeout(timeout);
  if(e.key === 'Enter') {
    let codigo = buffer.trim();
    buffer = "";
    if(codigo) procesar(codigo);
    return;
  }
  if(e.key.length === 1) buffer += e.key;
  timeout = setTimeout(() => buffer = "", 120);
});

function añadirManual(e){
  e?.preventDefault();
  let c = manualInput.value.trim();
  if(!c) return;
  procesar(c);
  manualInput.value = "";
  manualInput.blur();
}

function borrar(i){
  if(i < 0 || i >= inventario.length || !inventario[i]) return;
  if(confirm("¿Eliminar?")) {
    inventario.splice(i, 1);
    actualizarTabla();
  }
}

function exportarCSV(){
  if(!inventario.length) {
    alert("No hay datos");
    return;
  }
  let csv = "codigo;cantidad\n";
  inventario.forEach(i => {
    if(i && i.codigo) csv += `${i.codigo};${i.cantidad || 0}\n`;
  });
  let blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "inventario.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  if(confirm('¿Limpiar inventario después de exportar?')) {
    inventario = [];
    localStorage.removeItem('inv');
    actualizarTabla();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  popupNormal.style.display = 'none';
  popupNuevo.style.display = 'none';
  actualizarTabla();
});
</script>
</body>
</html>
